<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Noura's Magic Touch</title>
  <style>
    :root{
      --beige:#D4CAB9;--beige-lt:#E8E2D8;--olive:#5C6E5C;--olive-dk:#3F4E3F;
      --plum:#73607B;--lavender:#B0A3B4;--white:#FAF8F4;--deep:#2C2330;
      --font-display:'Cormorant Garamond',Georgia,serif;--font-body:'Alata',sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
      background:linear-gradient(145deg,var(--beige-lt),var(--beige));
      color:var(--olive-dk);font-family:var(--font-body);
    }
    .card{
      width:min(680px,100%);background:var(--white);padding:40px 30px;border:1px solid rgba(115,96,123,.14);
      box-shadow:0 22px 56px rgba(44,35,48,.12);text-align:center;
      display:flex;flex-direction:column;align-items:center;
    }
    .kicker{
      margin:0 0 10px;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--plum);
    }
    h1{
      margin:0 0 14px;font-family:var(--font-display);font-weight:300;line-height:1.15;
      font-size:clamp(2rem,5vw,3rem);color:var(--deep);
    }
    p{margin:0 auto 22px;max-width:44ch;line-height:1.8;font-size:.92rem;color:var(--olive)}
    .msg{
      margin:0 0 20px;padding:11px 12px;border-radius:2px;text-align:center;font-size:.8rem;
      width:min(520px,100%);
      border:1px solid rgba(176,163,180,.4);background:rgba(115,96,123,.08);color:var(--deep);
    }
    .btn{
      display:inline-block;text-decoration:none;background:var(--olive);color:var(--white);
      padding:13px 22px;letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;border-radius:2px;
    }
    .btn:hover{background:var(--plum)}
  </style>
</head>
<body>
  <main class="card">
    <p class="kicker">Booking Received</p>
    <h1>Thank you for your request.</h1>
    <p>We received your spa booking details. Our team will review your preferences and contact you shortly to confirm your session.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <a href="{% url 'home' %}" class="btn">Back to Home</a>
  </main>
</body>
</html>
